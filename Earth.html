  .search-box:focus{border-color:var(--hover-color);box-shadow:0 0 0 3px rgba(244,197,66,0.25)}
  .search-box::placeholder{color:var(--text-color);opacity:0.5}
  .main-row{
    display:flex;gap:30px;width:100%;max-width:1250px;

  .info-card{
    width:320px;background:var(--card-bg);border-radius:32px;
    padding:30px 24px;text-align:center;
    box-shadow:var(--shadow-soft);border:2px solid var(--border-color);
    backdrop-filter:blur(12px);min-height:240px;
    display:flex;flex-direction:column;justify-content:center;
  }

    transition:transform .3s;filter:drop-shadow(0 10px 14px rgba(0,0,0,0.25));
    min-height:90px;display:flex;align-items:center;justify-content:center;
  }
  .flag-display img{
    height:80px;width:auto;

  }
  .flag-display.bounce{animation:flagBounce .6s cubic-bezier(.175,.885,.32,1.275)}
  @keyframes flagBounce{
    0%{transform:scale(.15) rotate(-15deg);opacity:0}
    65%{transform:scale(1.2) rotate(3deg);opacity:1}
    100%{transform:scale(1) rotate(0deg);opacity:1}
  }

  .info-card .meta{font-size:12px;opacity:.5;margin-top:16px;font-style:italic}

  .globe-container canvas{
    width:100%;height:100%;display:block;
    filter:drop-shadow(0 15px 35px rgba(0,0,0,0.45));
  }

    position:fixed;pointer-events:none;
    background:rgba(22,26,34,0.96);color:#fff;
    padding:9px 18px;border-radius:20px;font-size:15px;font-weight:700;

function flagUrl(emoji){
  const codePoints=[];
  for(const s of [...emoji]){
    codePoints.push(s.codePointAt(0).toString(16));
  }
  return`https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/svg/${codePoints.join('-')}.svg`;
}
function flagImg(emoji,size){
  size=size||80;
  return`<img src="${flagUrl(emoji)}" alt="flag" style="height:${size}px;width:auto" onerror="this.style.display='none'">`;
}

const aliases={
  "Côte d'Ivoire":"Ivory Coast","Czech Republic":"Czechia",
  "Republic of the Congo":"Congo","Democratic Republic of the Congo":"Dem. Rep. Congo",
  "South Sudan":"S. Sudan","Dominican Republic":"Dominican Rep.",
  "Equatorial Guinea":"Eq. Guinea","Western Sahara":"W. Sahara",
  "Solomon Islands":"Solomon Is.","Falkland Islands":"Falkland Is.",
  "North Macedonia":"N. Macedonia","Swaziland":"eSwatini",
  "East Timor":"Timor-Leste","Burma":"Myanmar","The Bahamas":"Bahamas",
  "United Republic of Tanzania":"Tanzania","Republic of Serbia":"Serbia",
  "Central African Rep.":"Central African Republic",
};

function getInfo(name){
  if(factsDB[name])return factsDB[name];
  if(aliases[name]&&factsDB[aliases[name]])return factsDB[aliases[name]];
  for(const k in factsDB){if(name.includes(k)||k.includes(name))return factsDB[k];}
  return null;
}

const canvas=document.getElementById("globeCanvas"),ctx=canvas.getContext("2d",{alpha:false});
let width,height,features=[],currentHover=null;
let rotation=[0,-18,0],isInteracting=false,autoRotate=true,lastInteraction=Date.now();
let velocity=[0,0],inertiaTimer=null;

let currentScale=1;
let targetScale=1;
const ZOOM_MIN=0.6;
const ZOOM_MAX=3.2;
const ZOOM_SPEED=0.0018;
const ZOOM_LERP=0.10;

const projection=d3.geoOrthographic().clipAngle(90).precision(.15);
const pathGen=d3.geoPath(projection,ctx);

function resize(){
  const s=canvas.parentElement.clientWidth;
  width=s;height=s;canvas.width=width;canvas.height=height;
  projection.translate([width/2,height/2]).scale(width/2.1*currentScale);
}
window.addEventListener('resize',resize);resize();

function flyTo(coords){
  autoRotate=false;
  const interp=d3.interpolate(projection.rotate(),[-coords[0],-coords[1]]);
  d3.transition().duration(1200).ease(d3.easeCubicOut)
    .tween("rotate",()=>t=>{rotation=interp(t);lastInteraction=Date.now()})
    .on("end",()=>{autoRotate=true;});
}

function applyInertia(){
  if(Math.abs(velocity[0])<0.02&&Math.abs(velocity[1])<0.02){velocity=[0,0];return}
  rotation[0]+=velocity[0];rotation[1]-=velocity[1];
  velocity[0]*=0.93;velocity[1]*=0.93;
  lastInteraction=Date.now();
  inertiaTimer=requestAnimationFrame(()=>{applyInertia();});
}

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json").then(data=>{
  features=topojson.feature(data,data.objects.countries).features;
});

const drag=d3.drag()
  .on("start",()=>{
    isInteracting=true;autoRotate=false;
    if(inertiaTimer){cancelAnimationFrame(inertiaTimer);inertiaTimer=null;}
    velocity=[0,0];canvas.style.cursor='grabbing';
  })
  .on("drag",event=>{
    const k=75/(projection.scale());
    if(event.dx!==undefined&&event.dy!==undefined){
      rotation[0]+=event.dx*k;rotation[1]-=event.dy*k;
      velocity=[event.dx*k*0.45,event.dy*k*0.45];
    }
    lastInteraction=Date.now();
  })
  .on("end",()=>{
    isInteracting=false;canvas.style.cursor='grab';
    if(Math.abs(velocity[0])>0.1||Math.abs(velocity[1])>0.1)applyInertia();
    else autoRotate=true;
  });
d3.select(canvas).call(drag);

canvas.addEventListener("wheel",e=>{
  e.preventDefault();
  targetScale-=e.deltaY*ZOOM_SPEED;
  targetScale=Math.min(Math.max(targetScale,ZOOM_MIN),ZOOM_MAX);
  lastInteraction=Date.now();
},{passive:false});

canvas.addEventListener("mousemove",e=>{
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(canvas.width/rect.width);
  const y=(e.clientY-rect.top)*(canvas.height/rect.height);
  const p=projection.invert([x,y]);
  currentHover=(p&&Math.abs(p[0])<=180)?features.find(f=>d3.geoContains(f,p)):null;
  const tooltip=document.getElementById("tooltipDiv");
  if(currentHover){
    const nm=currentHover.properties.name;
    const inf=getInfo(nm);
    const f=inf?inf.flag:"📍";
    tooltip.style.display="flex";
    tooltip.style.left=e.clientX+18+"px";
    tooltip.style.top=e.clientY-18+"px";
    tooltip.innerHTML=`${flagImg(f,22)}<span>${inf?inf.name:nm}</span>`;
  }else{
    tooltip.style.display="none";
  }
});

canvas.addEventListener("click",()=>{
  if(currentHover){
    const nm=currentHover.properties.name;
    const inf=getInfo(nm)||{flag:"📍",name:nm,fact:"Информации пока нет, но страна заслуживает внимания!"};
    const flagEl=document.getElementById("flagEmoji");
    flagEl.innerHTML=flagImg(inf.flag,80);
    flagEl.classList.remove("bounce");
    void flagEl.offsetWidth;
    flagEl.classList.add("bounce");
    document.getElementById("countryName").innerText=inf.name;
    document.getElementById("factText").innerText=inf.fact;
    document.getElementById("metaText").innerText=nm;
    const center=d3.geoCentroid(currentHover);
    flyTo(center);
  }
});

document.getElementById("searchInput").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase().trim();if(!q)return;
  let country=null;
  for(const [eng,data] of Object.entries(factsDB)){
    if(data.name.toLowerCase().includes(q)||eng.toLowerCase().includes(q)){
      country=features.find(f=>{
        const n=f.properties.name;
        return n===eng||n.toLowerCase().includes(eng.toLowerCase())||(aliases[n]&&aliases[n]===eng);
      });
      if(country)break;
    }
  }
  if(!country)country=features.find(f=>f.properties.name.toLowerCase().includes(q));
  if(country){
    const center=d3.geoCentroid(country);
    flyTo(center);currentHover=country;
    canvas.dispatchEvent(new Event('click'));
  }
});

d3.timer(()=>{
  const diff=targetScale-currentScale;
  if(Math.abs(diff)>0.0001){
    currentScale+=diff*ZOOM_LERP;
  }else{
    currentScale=targetScale;
  }
  projection.scale(width/2.1*currentScale);

  if(autoRotate&&!isInteracting&&Date.now()-lastInteraction>2800){
    rotation[0]+=0.18;
  }

  ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--bg-color');
  ctx.fillRect(0,0,width,height);
  ctx.save();
  ctx.beginPath();ctx.arc(width/2,height/2,projection.scale(),0,2*Math.PI);ctx.clip();
  ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--sea-color');
  ctx.fill();
  projection.rotate(rotation);
  
  const landColor=getComputedStyle(document.body).getPropertyValue('--land-color');
  const hoverColor=getComputedStyle(document.body).getPropertyValue('--hover-color');
  const borderColor=getComputedStyle(document.body).getPropertyValue('--border-color');

  features.forEach(d=>{
    ctx.beginPath();pathGen(d);
    
    // ✅ Гренландия теперь зелёная как все страны (убрано специальное правило)
    let fillColor = landColor;

    if(d===currentHover){
      ctx.fillStyle=hoverColor;ctx.fill();
      ctx.strokeStyle=borderColor;ctx.lineWidth=2.4;ctx.stroke();
      ctx.strokeStyle='#ffffff';ctx.lineWidth=1;ctx.stroke();
    }else{
      ctx.fillStyle=fillColor;ctx.fill();
      ctx.strokeStyle=borderColor;ctx.lineWidth=1.6;ctx.stroke();
    }
  });
  ctx.restore();
});
})();
</script>
